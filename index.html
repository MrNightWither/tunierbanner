<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>NightWither – Dark Card</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0d;
    width: 1080px;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  .banner-card {
    position: relative;
    width: 100%;
    background: linear-gradient(135deg, #111117 0%, #0d0d11 100%);
    border-bottom: 1px solid #1e1e28;
    overflow: hidden;
    padding: 36px 60px;
    display: flex;
    align-items: center;
    gap: 48px;
  }

  .banner-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.6) 40%, rgba(240,208,128,0.9) 50%, rgba(201,168,76,0.6) 60%, transparent);
  }

  .banner-card::after {
    content: '';
    position: absolute;
    top: -80px; left: -80px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(201,168,76,0.11) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-divider {
    width: 2px;
    height: 100px;
    background: linear-gradient(180deg, transparent, rgba(201,168,76,0.45), transparent);
    flex-shrink: 0;
  }

  .card-date-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  .card-day {
    font-size: 72px;
    font-weight: 700;
    color: #c9a84c;
    line-height: 1;
    text-shadow: 0 0 30px rgba(201,168,76,0.35);
  }

  .card-month {
    font-size: 18px;
    letter-spacing: 5px;
    color: #7a6030;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }

  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    z-index: 1;
  }

  .card-eyebrow {
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c9a84c;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    opacity: 0.85;
  }

  .card-headline {
    font-size: 58px;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 3px;
    line-height: 1;
  }

  .card-sub {
    font-size: 22px;
    color: #5a5a6a;
    font-family: 'Inter', sans-serif;
    margin-top: 4px;
  }

  .card-time {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 20px;
    background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 4px;
    padding: 10px 24px;
    width: fit-content;
  }

  .card-time-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #c9a84c;
    box-shadow: 0 0 8px rgba(201,168,76,0.9);
    animation: pulse 2s infinite;
  }

  .card-time-text {
    font-size: 22px;
    color: #c9a84c;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 2px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px rgba(201,168,76,0.9); }
    50%       { opacity: 0.4; transform: scale(0.75); box-shadow: 0 0 3px rgba(201,168,76,0.3); }
  }
</style>
</head>
<body>

<div class="banner-card">
  <div class="card-date-block">
    <div class="card-day">18</div>
    <div class="card-month">Juli</div>
  </div>
  <div class="card-divider"></div>
  <div class="card-body">
    <div class="card-eyebrow">NightWither Event</div>
    <div class="card-headline">Warzone Turnier</div>
    <div class="card-sub">Meldet euch gerne!</div>
    <div class="card-time">
      <div class="card-time-dot"></div>
      <div class="card-time-text">Start: 21:00 Uhr</div>
    </div>
  </div>
</div>

</body>
</html>
